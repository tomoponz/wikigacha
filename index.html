<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wikipedia Gacha</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="antialiased bg-dark text-white">

<main class="min-h-screen">
    <nav class="sticky-nav">
        <button class="nav-btn left-btn" aria-label="Toggle Language" id="lang-btn">🇯🇵</button>
        <button class="nav-tab active">ガチャ</button>
        <button class="nav-tab">図鑑</button>
        <button class="nav-tab">バトル</button>
        <div class="right-btns">
            <button class="nav-btn" aria-label="Trophies">🏆</button>
            <button class="nav-btn circle-btn" aria-label="Game Info">?</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="gacha-container">
            <div class="status-header">
                <span class="pack-badge">
                    本日のパック: <span class="text-white text-lg" id="pack-count">10</span> / 10
                </span>
                <p class="subtitle" id="time-until-next">パック満タン</p>
                <p class="gold-text">金パックまであと<span id="pulls-left">10</span>回</p>
            </div>

            <div id="gacha-pack-container" class="pack-wrapper">
                <div class="pack-image-container">
                    <div class="dummy-pack">WIKI PACK</div>
                    </div>
                <div class="tap-hint animate-pulse">▲ タップで開ける ▲</div>
            </div>

            <div class="missions-box">
                <h3 class="missions-title">デイリーミッション</h3>
                <div class="missions-list">
                    <div class="mission-item">
                        <span>ガチャを5回引く</span>
                        <span class="mission-progress" id="ms-open-packs">0/5</span>
                    </div>
                    <div class="mission-item">
                        <span>SR以上を1枚引く</span>
                        <span class="mission-progress" id="ms-sr">0/1</span>
                    </div>
                    <div class="mission-item">
                        <span>Wikipediaを1回開く</span>
                        <span class="mission-progress" id="ms-wiki">0/1</span>
                    </div>
                    <div class="mission-item">
                        <span>結果をシェアする</span>
                        <span class="mission-progress">0/1</span>
                    </div>
                    <div class="mission-item">
                        <span>広告を閲覧する</span>
                        <span class="mission-progress">0/1</span>
                    </div>
                </div>
                <p class="reward-hint">報酬: 各ミッション達成で +2 パック</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p class="footer-msg">こちらのサイトは個人で運営しています。もしご支援いただける場合は、<a class="text-blue underline" href="#">お問い合わせページ</a>をご覧ください。</p>
        <div class="footer-links">
            <a href="#">プライバシーポリシー</a>
            <span class="separator">|</span>
            <a href="#">利用規約</a>
            <span class="separator">|</span>
            <a href="#">お問い合わせ</a>
        </div>
    </footer>
</main>

<div id="result-modal" class="modal hidden">
    <div class="modal-content">
        <div class="card" id="result-card">
            <h2 id="card-rarity" class="rarity">UR</h2>
            <h3 id="card-title" class="card-title">記事タイトル</h3>
            <p id="card-desc" class="card-desc">記事の概要がここに入ります...</p>
        </div>
        <div class="modal-actions">
            <a id="wiki-link" href="#" target="_blank" class="btn btn-wiki">Wikipediaで開く</a>
            <button id="close-btn" class="btn btn-close">閉じる</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
